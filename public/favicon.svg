<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0E1921"/>
  <!-- Bar chart bars -->
  <rect x="4"  y="20" width="4" height="8"  rx="1.5" fill="#C7F711" opacity="0.45"/>
  <rect x="10" y="14" width="4" height="14" rx="1.5" fill="#C7F711" opacity="0.70"/>
  <rect x="16" y="8"  width="4" height="20" rx="1.5" fill="#C7F711"/>
  <rect x="22" y="12" width="4" height="16" rx="1.5" fill="#C7F711" opacity="0.80"/>
  <!-- Trend line -->
  <polyline points="6,20 12,14 18,8 24,12" stroke="#C7F711" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Dot at peak -->
  <circle cx="18" cy="8" r="2" fill="#C7F711"/>
</svg>
